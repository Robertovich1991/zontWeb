        <script>
            // Localize meta description, og:title, og:description and html lang BEFORE React hydrates.
            // This ensures crawlers that don't execute heavy JS (Babylovegrowth, GPTBot, simple bots)
            // still see the correct localized SEO meta on /ru, /en, /hy, /fr.
            (function(){
                try {
                    var p = (window.location.pathname || '').toLowerCase();
                    var lang = 'en', metaDesc, ogTitle, ogDesc;

                    // Detect language from URL prefix (NOTE: /en does NOT exist — English is the root /).
                    // Or from a Russian-specific slug for localized SEO pages.
                    var ruSlugs = ['/taksi-', '/transfer-', '/aeroporta', '/parizh', '/disneyland-parizh', '/versal', '/zhiverni', '/monsenmishel', '/evrodisney', '/luvr-', '/shantilli'];

                    if (p.indexOf('/ru') === 0) lang = 'ru';
                    else if (p.indexOf('/fr') === 0) lang = 'fr';
                    else if (p.indexOf('/hy') === 0) lang = 'hy';
                    else {
                        for (var i = 0; i < ruSlugs.length; i++) { if (p.indexOf(ruSlugs[i]) === 0) { lang = 'ru'; break; } }
                    }

                    if (lang === 'ru') {
                        metaDesc = 'Трансферы из аэропортов Парижа (CDG/ORY/BVA) и 120+ городов Европы у лицензированных водителей: фиксированная цена и отслеживание рейса.';
                        ogTitle = 'Zont — Премиум трансфер из аэропорта в Европе';
                        ogDesc  = 'Частный водитель в Париже и 120+ городах Европы. Фиксированные цены, встреча с табличкой, отслеживание рейса.';
                    } else if (lang === 'fr') {
                        metaDesc = "Transfert privé premium en 120+ villes d'Europe. Prix fixes garantis, suivi des vols en temps réel et accueil personnalisé. Réservez en ligne maintenant.";
                        ogTitle = 'Zont — Transfert Aéroport Premium en Europe';
                        ogDesc  = 'Chauffeur privé en 120+ villes. Prix fixes, suivi de vol, accueil personnalisé.';
                    } else if (lang === 'hy') {
                        metaDesc = 'Պրեմիում օդանավակայանի տրանսֆեր Փարիզում (CDG/ORY/BVA) և 120+ եվրոպական քաղաքներում: Հաստատ գներ, թռիչքի հետևելում:';
                        ogTitle = 'Zont — Պրեմիում օդանավակայանի տրանսֆեր Եվրոպայում';

                        metaDesc = 'Professional private driver for Paris airports (CDG, ORY, BVA). Fixed prices, flight tracking, and meet & greet—book your 24/7 Paris airport transfer.';
                        ogTitle = 'Zont — Premium Airport Transfer in Europe';
                        ogDesc  = 'Private chauffeur service in 120+ cities. Fixed prices, flight tracking, meet & greet.';
